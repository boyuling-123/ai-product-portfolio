<!doctype html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会议纪要 Skill - 案例详情</title>
  <style>
    :root{--bg:#fafafa;--ink:#0a0a0a;--muted:#667085;--line:#e2e6ee;--accent:#2563eb;--soft:#f4f7fb;--shadow:0 18px 48px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.7}main{max-width:960px;margin:0 auto;padding:42px 24px 70px}a{color:var(--accent);font-weight:800}.hero,.card{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}.hero{padding:30px}.card{padding:20px;margin-top:16px}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}h1{font-size:42px;line-height:1.1;margin:8px 0 12px}.muted{color:var(--muted)}img{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--soft)}.caption{margin:8px 0 0;color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
  </style>
  <link rel="stylesheet" href="../assets/highlights.css">
</head>
<body>
  <main>
    <a href="../pages/skills.html">返回 Skill</a>
    <section class="hero"><p class="eyebrow">Skill Case</p><h1>会议纪要 Skill</h1><p class="muted">把会议转写整理成结论、行动项、风险、待确认问题和后续跟进。</p></section>
    <section class="card"><h2>工作流逻辑</h2><ul><li>输入：会议转写、会议背景、参会角色和目标。</li><li>处理：过滤闲聊，提取结论、分歧、行动项和阻塞点。</li><li>输出：结构化纪要、负责人/时间节点、待确认问题和下一步。</li></ul></section>
    <section class="grid">
      <article class="card"><h2>纪要样例</h2><img src="../assets/evidence/handwritten/skill-meeting-notes-01.png" alt="会议纪要 Skill 输出样例截图"><p class="caption">转写信息整理成结构化纪要的展示方式。</p></article>
      <article class="card"><h2>仍缺素材</h2><p class="muted">建议补一段脱敏转写作为输入，让前后差异更清楚。</p></article>
    </section>
  </main>
