<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skill Visualizer - 案例详情</title>
  <style>
    :root { --bg:#fafafa; --surface:#fff; --ink:#0a0a0a; --muted:#667085; --line:#e2e6ee; --accent:#2563eb; --soft:#f4f7fb; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; line-height:1.7; }
    main { max-width:960px; margin:0 auto; padding:42px 24px 70px; }
    a { color:var(--accent); font-weight:800; }
    .hero,.card { background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:0 18px 48px rgba(15,23,42,.08); }
    .hero { padding:30px; }
    .card { padding:18px; margin-top:16px; }
    img { width:100%; border:1px solid var(--line); border-radius:8px; background:var(--soft); }
    .caption { margin:8px 0 0; color:var(--muted); font-size:13px; }
    .shots { display:grid; grid-template-columns:1fr; gap:14px; margin-top:12px; }
    h1 { margin:8px 0 12px; font-size:42px; line-height:1.1; }
    h2 { margin:30px 0 10px; font-size:24px; }
    .eyebrow { color:var(--accent); font-size:12px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .muted { color:var(--muted); }
    .tags { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
    .tag { padding:3px 9px; border-radius:999px; background:#edf4ff; color:var(--accent); font-size:12px; font-weight:850; }
    li { margin:6px 0; }
    @media (max-width:800px){ h1{font-size:34px;} }
  </style>
  <link rel="stylesheet" href="../assets/highlights.css">
</head>
<body>
  <main>
    <a href="../pages/tools.html">返回自驱工具</a>
    <section class="hero">
      <p class="eyebrow">Case Study</p>
      <h1>Skill Visualizer</h1>
      <p class="muted">一个用于观察 Skill 执行过程的 HTML 可视化项目，配合 Claude Code 原生终端执行真实任务。</p>
      <div class="tags"><span class="tag">Skill Runtime</span><span class="tag">本地 Demo</span><span class="tag">真实截图</span></div>
      <p><a href="http://127.0.0.1:4173/">打开本地 Demo</a></p>
    </section>
    <section class="card">
      <div class="shots">
        <figure>
          <img src="../assets/screenshots/skill-visualizer-home.png" alt="Skill Visualizer 本地工作台截图">
          <figcaption class="caption">本地工作台首页：文件导入、节点图和运行观察入口。</figcaption>
        </figure>
        <figure>
          <img src="../assets/evidence/handwritten/skill-visualizer-01.png" alt="Skill Visualizer 节点执行与终端联动截图">
          <figcaption class="caption">HTML 可视化界面与 Claude Code 终端联动，展示节点、日志和实际生成结果。</figcaption>
        </figure>
        <figure>
          <img src="../assets/evidence/handwritten/skill-visualizer-02.png" alt="Skill Visualizer 多节点执行截图">
          <figcaption class="caption">节点运行过程和输出文件目录。</figcaption>
        </figure>
        <figure>
          <img src="../assets/evidence/handwritten/skill-visualizer-03.png" alt="Skill Visualizer 执行结果截图">
          <figcaption class="caption">用于展示可视化前后对比和执行结果。</figcaption>
        </figure>
      </div>
      <h2>设计逻辑</h2>
      <ul>
        <li>HTML 侧负责观察、呈现和组织节点状态。</li>
        <li>Claude Code 侧负责原生终端中的真实执行。</li>
        <li>通过观察提示词和事件协议把两侧连接起来。</li>
      </ul>
      <p class="muted">这组截图已经能说明“只需要 HTML + Claude Code 提示词”的新逻辑；公开发布前建议再截一版隐藏本地路径的干净图。</p>
    </section>
  </main>
</body>
</html>
