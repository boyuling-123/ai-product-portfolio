<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数字人视频生成 Skill - lby-作品集</title>
  <style>
    :root{--bg:#fafafa;--ink:#0a0a0a;--muted:#667085;--line:#e2e6ee;--accent:#2563eb;--soft:#f4f7fb;--shadow:0 18px 48px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.7}main{max-width:960px;margin:0 auto;padding:42px 24px 70px}a{color:var(--accent);font-weight:800}.hero,.card{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}.hero{padding:30px}.card{padding:20px;margin-top:16px}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}h1{font-size:42px;line-height:1.1;margin:8px 0 12px}.muted{color:var(--muted)}.slot{min-height:170px;border:1px dashed var(--line);border-radius:8px;background:var(--soft);display:grid;place-items:center;text-align:center;color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
  </style>
  <link rel="stylesheet" href="../assets/highlights.css">
</head>
<body>
  <main>
    <a href="../pages/skills.html">返回 Skill</a>
    <section class="hero"><p class="eyebrow">Skill Case</p><h1>数字人视频生成 Skill</h1><p class="muted">把数字人视频生成拆成输入、脚本、形象、声音、生成和验收链路。</p></section>
    <section class="card"><h2>工作流逻辑</h2><ul><li>输入：脚本、人物形象、声音、口播时长、画面比例和业务约束。</li><li>处理：校验脚本长度，绑定形象和声音，生成任务并轮询状态。</li><li>输出：视频结果、失败原因、重试建议和验收记录。</li><li>关键点：把“视频生成”拆成可追踪调用链路，而不是只看最终视频。</li></ul></section>
    <section class="grid"><article class="card"><h2>展示方式</h2><p class="muted">可以只展示逻辑 + 结果：一张调用链路图，一张入参出参表，一张视频截图即可。</p></article><article class="card"><h2>素材缺口</h2><div class="slot">调用链路 / 入参出参 / 视频效果</div></article></section>
  </main>
</body>
</html>
