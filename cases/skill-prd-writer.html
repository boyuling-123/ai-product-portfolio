  <main>
    <a href="../pages/skills.html">返回 Skill</a>
    <section class="hero"><p class="eyebrow">Skill Case</p><h1>PRD 撰写 Skill</h1><p class="muted">把需求背景、目标用户、业务约束和功能点转成结构化 PRD，适合展示“逻辑 + 输出”。</p></section>
